# 第四篇 ch35：生产环境 Nginx 配置示例
# 同一端口托管前端静态文件 + 反代后端 API，彻底解决跨域（前后端同源）
server {
    listen 80;
    server_name your-domain.com;

    # 前端静态资源（npm run build 产出的 dist/ 内容放到这里）
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;   # SPA 历史路由回退，刷新不 404
    }

    # 后端 API 反代（替代开发期的 Vite 代理）
    location /api/ {
        proxy_pass http://localhost:8080/;  # 末尾斜杠：/api/auth → /auth
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
