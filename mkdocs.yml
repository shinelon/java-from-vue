# ============================================================================
# 《给 Vue 工程师的 Java 全栈教程》 mkdocs 配置
# 主题: mkdocs-material | 本地构建: mkdocs serve / mkdocs build
# ============================================================================
site_name: 给 Vue 工程师的 Java 全栈教程
site_description: 从 Java 8 到 Spring Boot，专为前端工程师设计的全栈教程
site_author: shinelon
docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  icon:
    logo: material/language-java
  features:
    - navigation.instant         # SPA 式瞬时切换，无白屏
    - navigation.tracking        # URL 随标题锚点变化
    - navigation.tabs            # 顶级「篇」用标签栏
    - navigation.sections        # 二级按 section 分组
    - navigation.expand          # 默认展开侧边栏
    - navigation.top             # 「回到顶部」按钮
    - navigation.indexes         # 允许 index.md 作为分组首页
    - toc.follow                 # 侧边目录跟随滚动高亮
    - search.suggest             # 搜索联想
    - search.highlight           # 搜索结果高亮
    - content.code.copy          # 代码块「复制」按钮
    - content.code.annotate      # 代码注解
    - content.tabs.link          # 标签页联动
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换亮色模式

plugins:
  - search:
      lang:
        - en
        - ja   # mkdocs 无原生中文分词，日文分词器对中文检索有显著帮助

markdown_extensions:
  - admonition                  # !!! note / tip / warning 提示框
  - pymdownx.details            # 可折叠的 ??? note
  - pymdownx.superfences:       # 嵌套代码块 + mermaid 图表（material 原生支持）
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:          # ★ 核心：--8<-- 引用 code/ 下真实 .java，零漂移
      base_path:
        - code
      check_paths: true         # 引用路径找不到时硬报错（防止静默失效）
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite       # 行内代码高亮 `#!java var`
  - attr_list                   # 给图片/代码块加属性
  - md_in_html                  # markdown 嵌入 HTML
  - def_list                    # 定义列表
  - footnotes                   # 脚注 [^1]
  - tables                      # 表格
  - toc:
      permalink: true           # 标题永久链接锚点

nav:
  - 首页: index.md
  - 第一篇 · 准备与地图:
